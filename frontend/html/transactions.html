<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendSmart | Transactions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components/sidebar.css" />
  <link rel="stylesheet" href="/css/components/topbar.css" />
  <link rel="stylesheet" href="/css/components/buttons.css" />
  <link rel="stylesheet" href="/css/components/table.css" />
  <link rel="stylesheet" href="/css/components/modal.css" />
  <link rel="stylesheet" href="/css/pages/transactions.css?v=tx-table-v5" />
  <script type="module" src="/js/pages/transactions.js?v=tx-table-v5"></script>
</head>
<body>
  <div class="app-shell">
    <aside id="sidebarMount"></aside>

    <section class="content-area">
      <div id="topbarMount"></div>

      <main class="page-content">
        <section class="dark-surface">
          <div class="dark-head">
            <h1>Transactions</h1>
            <div class="head-actions">
              <button id="openTransactionModal" class="teal-btn" type="button">+ New transaction</button>
              <div class="tx-filter-wrap">
                <button
                  id="transactionsFilterButton"
                  class="icon-btn"
                  type="button"
                  title="Filter: All"
                  aria-label="Filter: All"
                  aria-haspopup="menu"
                  aria-expanded="false"
                >⌯</button>
                <div id="transactionsFilterMenu" class="tx-filter-menu hidden" role="menu" aria-label="Transaction filters">
                  <button class="tx-filter-item active" type="button" data-filter="all" role="menuitem">All</button>
                  <button class="tx-filter-item" type="button" data-filter="income" role="menuitem">Income</button>
                  <button class="tx-filter-item" type="button" data-filter="expense" role="menuitem">Expense</button>
                  <button class="tx-filter-item" type="button" data-filter="this_month" role="menuitem">This Month</button>
                  <button class="tx-filter-item" type="button" data-filter="last_month" role="menuitem">Last Month</button>
                </div>
              </div>
              <button id="transactionsExportButton" class="icon-btn" type="button" title="Export CSV (Download)" aria-label="Export transactions CSV">⬇</button>
            </div>
          </div>

          <div class="table-wrap">
            <table class="dark-table">
              <thead>
                <tr>
                  <th>Details</th>
                  <th>Type</th>
                  <th>Source</th>
                  <th>Category</th>
                  <th>Amount</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="transactionsTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </section>
  </div>

  <div class="modal hidden" id="transactionModal">
    <div class="modal-card dark-modal">
      <button class="close-modal" data-close="transactionModal" type="button">✕</button>
      <h3 id="transactionModalTitle">Add Transaction</h3>
      <form id="transactionForm">
        <label>Amount<input type="number" name="amount" min="0" step="0.01" placeholder="0.00" required /></label>
        <label>
          Type
          <select name="type" required>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </label>
        <label>Category<input type="text" name="category" placeholder="Food, Rent, Salary" required /></label>
        <label>Merchant / Source<input type="text" name="merchant_or_source" placeholder="Optional" /></label>
        <label>Description<input type="text" name="description" placeholder="Optional" /></label>
        <label>Date<input type="date" name="entry_date" required /></label>
        <label>
          Payment Method
          <select name="payment_method">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Bank Transfer">Bank Transfer</option>
          </select>
        </label>
        <button id="transactionSubmitButton" class="teal-btn full" type="submit">Add Transaction</button>
      </form>
    </div>
  </div>
</body>
</html>
