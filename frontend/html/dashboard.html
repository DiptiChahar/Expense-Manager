<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendSmart | Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components/sidebar.css" />
  <link rel="stylesheet" href="/css/components/topbar.css" />
  <link rel="stylesheet" href="/css/components/buttons.css" />
  <link rel="stylesheet" href="/css/components/panel.css" />
  <link rel="stylesheet" href="/css/pages/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script type="module" src="/js/pages/dashboard.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside id="sidebarMount"></aside>

    <section class="content-area">
      <div id="topbarMount"></div>

      <main class="page-content">
        <section class="view-head">
          <div>
            <h1>Dashboard</h1>
            <p>Your financial overview at a glance</p>
          </div>
        </section>

        <section class="metric-grid">
          <article class="metric-card">
            <div class="metric-icon mint">↗</div>
            <p>Total Income</p>
            <h3 id="metricIncome">$0.00</h3>
          </article>
          <article class="metric-card">
            <div class="metric-icon rose">↘</div>
            <p>Total Expenses</p>
            <h3 id="metricExpense">$0.00</h3>
          </article>
          <article class="metric-card">
            <div class="metric-icon blue">$</div>
            <p>Balance</p>
            <h3 id="metricBalance">$0.00</h3>
          </article>
          <article class="metric-card">
            <div class="metric-icon lilac">◎</div>
            <p>Savings Rate</p>
            <h3 id="metricSavings">0%</h3>
          </article>
        </section>

        <section class="panel-grid two-col">
          <article class="panel">
            <div class="panel-head">
              <h2>Expense Trend</h2>
            </div>
            <canvas id="expenseTrendChart"></canvas>
          </article>

          <article class="panel">
            <div class="panel-head">
              <h2>Category Breakdown</h2>
            </div>
            <canvas id="categoryChart"></canvas>
          </article>
        </section>

        <section class="panel-grid two-col">
          <article class="panel">
            <div class="panel-head">
              <h2>Recent Transactions</h2>
            </div>
            <div id="recentTransactions" class="recent-list"></div>
          </article>

          <article class="panel">
            <div class="panel-head">
              <h2>Statistics</h2>
              <span>Weekly Comparison</span>
            </div>
            <canvas id="statisticsChart"></canvas>
          </article>
        </section>
      </main>
    </section>
  </div>
</body>
</html>
