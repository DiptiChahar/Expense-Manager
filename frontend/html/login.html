<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendSmart | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components/buttons.css" />
  <link rel="stylesheet" href="/css/pages/login.css" />
  <script type="module" src="/js/pages/login.js"></script>
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-pane auth-pane-left">
      <div class="auth-inner">
        <div class="auth-brand">
          <div class="auth-brand-icon" aria-hidden="true">↗</div>
          <h1>SpendSmart</h1>
          <p>AI-powered expense management</p>
        </div>

        <section class="auth-card">
          <h2>Sign In</h2>

          <form id="loginForm" class="auth-form" novalidate>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />

            <p id="authError" class="auth-error hidden" role="alert" aria-live="polite"></p>

            <button id="submitButton" class="solid-btn full auth-submit" type="submit">Sign In</button>
          </form>

          <p class="auth-switch">Don't have an account? <a href="/html/register.html">Sign up</a></p>
        </section>
      </div>
    </section>

    <aside class="auth-pane auth-pane-right">
      <div class="hero-content">
        <h2>Take control of your finances</h2>
        <p>Track expenses, set budgets, achieve goals with AI-powered insights</p>
        <ul>
          <li>Smart expense tracking</li>
          <li>ML-powered predictions</li>
          <li>Goal-based savings</li>
        </ul>
      </div>
    </aside>
  </main>
</body>
</html>
