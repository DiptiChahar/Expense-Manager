<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendSmart | Goals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components/sidebar.css" />
  <link rel="stylesheet" href="/css/components/topbar.css" />
  <link rel="stylesheet" href="/css/components/buttons.css" />
  <link rel="stylesheet" href="/css/components/panel.css" />
  <link rel="stylesheet" href="/css/components/modal.css" />
  <link rel="stylesheet" href="/css/pages/goals.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script type="module" src="/js/pages/goals.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside id="sidebarMount"></aside>

    <section class="content-area">
      <div id="topbarMount"></div>

      <main class="page-content">
        <section class="view-head">
          <div>
            <h1>Goals</h1>
            <p>Track savings and category-wise targets</p>
          </div>
          <button id="openGoalModal" class="solid-btn" type="button">+ Add Goal</button>
        </section>

        <section class="panel-grid two-col">
          <article class="panel">
            <div class="panel-head">
              <h2>Savings Goal</h2>
              <button class="mini-chip" type="button">01 May - 31 May ▾</button>
            </div>
            <div class="goal-hero" id="goalSummary"></div>
          </article>

          <article class="panel">
            <div class="panel-head">
              <h2>Saving Summary</h2>
              <button class="mini-chip" type="button">Mar 2026 ▾</button>
            </div>
            <canvas id="goalChart"></canvas>
          </article>
        </section>

        <article class="panel">
          <div class="panel-head">
            <h2>Expenses Goals by Category</h2>
          </div>
          <div class="goal-cards" id="goalCards"></div>
        </article>
      </main>
    </section>
  </div>

  <div class="modal hidden" id="goalModal">
    <div class="modal-card">
      <button class="close-modal" data-close="goalModal" type="button">✕</button>
      <h3>Add Goal</h3>
      <form id="goalForm">
        <label>Goal Name<input type="text" name="name" required /></label>
        <label>Category<input type="text" name="category" placeholder="Housing, Food, Travel" /></label>
        <label>Target Amount<input type="number" name="target_amount" min="0" step="0.01" required /></label>
        <label>Current Saved<input type="number" name="achieved_amount" min="0" step="0.01" value="0" required /></label>
        <label>Due Date<input type="date" name="due_date" required /></label>
        <button class="solid-btn full" type="submit">Save Goal</button>
      </form>
    </div>
  </div>
</body>
</html>
