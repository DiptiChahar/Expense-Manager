<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendSmart | Income</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components/sidebar.css" />
  <link rel="stylesheet" href="/css/components/topbar.css" />
  <link rel="stylesheet" href="/css/components/buttons.css" />
  <link rel="stylesheet" href="/css/components/panel.css" />
  <link rel="stylesheet" href="/css/components/table.css" />
  <link rel="stylesheet" href="/css/components/modal.css" />
  <link rel="stylesheet" href="/css/pages/income.css" />
  <script type="module" src="/js/pages/income.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside id="sidebarMount"></aside>

    <section class="content-area">
      <div id="topbarMount"></div>

      <main class="page-content">
        <section class="view-head">
          <div>
            <h1>Income</h1>
            <p>Manage your income sources</p>
          </div>
          <button id="openIncomeModal" class="solid-btn" type="button">+ Add Income</button>
        </section>

        <article class="panel income-summary">
          <p>Total Income</p>
          <h3 id="incomeTotalPage">$0.00</h3>
        </article>

        <article class="panel">
          <div class="table-wrap">
            <table class="light-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Source</th>
                  <th>Description</th>
                  <th>Amount</th>
                </tr>
              </thead>
              <tbody id="incomeTableBody"></tbody>
            </table>
          </div>
        </article>
      </main>
    </section>
  </div>

  <div class="modal hidden" id="incomeModal">
    <div class="modal-card">
      <button class="close-modal" data-close="incomeModal" type="button">✕</button>
      <h3>Add Income</h3>
      <form id="incomeForm">
        <label>Amount<input type="number" name="amount" min="0" step="0.01" placeholder="0.00" required /></label>
        <label>Source<input type="text" name="source" placeholder="Software developer" required /></label>
        <label>Description<input type="text" name="description" placeholder="Optional" /></label>
        <label>Date<input type="date" name="entry_date" required /></label>
        <button class="solid-btn full" type="submit">Add Income</button>
      </form>
    </div>
  </div>
</body>
</html>
